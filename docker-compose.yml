version: "3.9"

services:
  frontend:
    build: .
    image: dlimiyassin/athar-frontend:latest
    container_name: athar-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"
    env_file:
      - .env
    networks:
      - AtharSharedNetwork

networks:
  AtharSharedNetwork:
    external: true
